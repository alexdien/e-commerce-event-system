apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: ecommerce-events-notifications:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notifications
  namespace: ecommerce
spec:
  type: NodePort
  selector:
    app: notifications
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30003